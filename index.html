<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Listing Generator</title>
  <link rel="icon" type="image/x-icon" href="/images/checklist.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f7f7f8;
      --surface:     #ffffff;
      --border:      #e4e4e7;
      --border-h:    #c4c4cf;
      --muted:       #8e8e9b;
      --text:        #18181b;
      --text-sec:    #52525b;
      --accent:      #3730a3;
      --accent-h:    #312e81;
      --accent-ring: rgba(55,48,163,.13);
      --tag-bg:      #f4f4f6;
      --tag-text:    #52525b;
      --success:     #15803d;
      --success-bg:  #f0fdf4;
      --success-bd:  #bbf7d0;
      --error-bg:    #fef2f2;
      --error-txt:   #b91c1c;
      --radius:      10px;
      --shadow:      0 1px 2px rgba(0,0,0,.05), 0 4px 12px rgba(0,0,0,.06);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 48px 16px 80px;
      -webkit-font-smoothing: antialiased;
    }

    .layout {
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header { margin-bottom: 40px; }
    .wordmark {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }
    .wordmark span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
    }
    header h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -.02em;
      line-height: 1.2;
      color: var(--text);
    }
    header p {
      margin-top: 8px;
      font-size: 14px;
      color: var(--text-sec);
      line-height: 1.6;
    }

    /* ── Form Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
      margin-bottom: 20px;
    }

    .field { margin-bottom: 18px; }
    .field:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input, textarea {
      width: 100%;
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 10px 13px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      resize: none;
    }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-ring);
      background: #fff;
    }
    textarea { min-height: 90px; line-height: 1.6; }

    /* ── Button ── */
    .btn-row { margin-top: 22px; display: flex; gap: 10px; align-items: center; }

    button.primary {
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 7px;
      padding: 11px 22px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: background .15s, opacity .15s, transform .1s;
    }
    button.primary:hover { background: var(--accent-h); }
    button.primary:active { transform: scale(.98); }
    button.primary:disabled { opacity: .5; cursor: not-allowed; }

    /* Spinner */
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: none;
    }
    .loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error Banner ── */
    .error-banner {
      display: none;
      background: var(--error-bg);
      border: 1px solid #fca5a5;
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 13px;
      color: var(--error-txt);
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .error-banner.visible { display: block; }

    /* ── Results ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #results { display: none; }
    #results.visible { display: block; }

    #results.visible .card {
      animation: fadeUp .25s ease both;
    }
    #results.visible .card:nth-child(1) { animation-delay: .04s; }
    #results.visible .card:nth-child(2) { animation-delay: .10s; }
    #results.visible .card:nth-child(3) { animation-delay: .16s; }
    #results.visible .card:nth-child(4) { animation-delay: .22s; }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Title section */
    .result-title {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -.01em;
      line-height: 1.35;
      color: var(--text);
    }

    /* Bullets */
    .bullet-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .bullet-list li {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-sec);
      padding-left: 18px;
      position: relative;
    }
    .bullet-list li::before {
      content: '▸';
      position: absolute;
      left: 0;
      color: var(--muted);
      font-size: 11px;
      top: 3px;
    }

    /* Description */
    .desc-text {
      font-size: 14px;
      line-height: 1.75;
      color: var(--text-sec);
    }

    /* Ads */
    .ads-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .ad-item {
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 12px 14px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .ad-item-body {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      flex: 1;
      min-width: 0;
    }
    .ad-item-actions {
      flex-shrink: 0;
      display: flex;
      align-items: flex-start;
      padding-top: 1px;
    }
    .ad-badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      background: #e9e9ef;
      color: var(--muted);
      border-radius: 4px;
      padding: 2px 6px;
      flex-shrink: 0;
      margin-top: 2px;
      letter-spacing: .04em;
    }
    .ad-text {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-sec);
    }

    /* Copy button */
    .copy-btn {
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 3px 9px;
      cursor: pointer;
      transition: color .15s, border-color .15s, background .15s;
      flex-shrink: 0;
    }
    .copy-btn:hover {
      color: var(--text);
      border-color: var(--border-h);
      background: var(--bg);
    }
    .copy-btn.copied { color: var(--success); border-color: var(--success-bd); background: var(--success-bg); }

    /* Divider */
    .results-divider {
      height: 1px;
      background: var(--border);
      margin: 4px 0 20px;
    }
  </style>
</head>
<body>
<div class="layout">

  <header>
    <div class="wordmark"><span></span> Listing Generator</div>
    <h1>Private AI for Amazon listing generation.</h1>
    <p>Generate SEO-ready titles, bullet points, descriptions, and A/B ad variants — fully local, zero API cost.</p>
  </header>

  <!-- Input Form -->
  <div class="card">
    <div class="field">
      <label for="name">Product Name</label>
      <input id="name" type="text" placeholder="e.g. Stainless Steel Water Bottle 32oz" />
    </div>
    <div class="field">
      <label for="features">Key Features</label>
      <textarea id="features" placeholder="e.g. BPA-free, leak-proof lid, keeps cold 24h, fits car cup holder"></textarea>
    </div>
    <div class="field">
      <label for="audience">Target Audience</label>
      <input id="audience" type="text" placeholder="e.g. Gym-goers, hikers, commuters" />
    </div>
    <div class="btn-row">
      <button class="primary" id="generateBtn" onclick="generate()">
        <div class="spinner" id="spinner"></div>
        <span class="btn-label">Generate listing → </span>
      </button>
    </div>
  </div>

  <!-- Error -->
  <div class="error-banner" id="errorBanner"></div>

  <!-- Results -->
  <div id="results">

    <!-- Title -->
    <div class="card">
      <div class="section-label">
        Title
        <button class="copy-btn" onclick="copySection('titleText', this)">Copy</button>
      </div>
      <div class="results-divider"></div>
      <div class="result-title" id="titleText"></div>
    </div>

    <!-- Bullets -->
    <div class="card">
      <div class="section-label">
        Bullet Points
        <button class="copy-btn" onclick="copySection('bulletsText', this)">Copy</button>
      </div>
      <div class="results-divider"></div>
      <ul class="bullet-list" id="bulletsList"></ul>
      <div id="bulletsText" style="display:none"></div>
    </div>

    <!-- Description -->
    <div class="card">
      <div class="section-label">
        Description
        <button class="copy-btn" onclick="copySection('descText', this)">Copy</button>
      </div>
      <div class="results-divider"></div>
      <p class="desc-text" id="descText"></p>
    </div>

    <!-- Ads -->
    <div class="card">
      <div class="section-label">
        Ad Variants
        <button class="copy-btn" onclick="copySection('adsText', this)">Copy</button>
      </div>
      <div class="results-divider"></div>
      <div class="ads-list" id="adsList"></div>
      <div id="adsText" style="display:none"></div>
    </div>

  </div><!-- /results -->
    <p style="font-size:12px;color:#8e8e9b;margin-top:8px;">
        Generated locally using Llama3 via Ollama
    </p>

</div><!-- /layout -->

<script>
  const btn    = document.getElementById('generateBtn');
  const spinner = document.getElementById('spinner');
  const error  = document.getElementById('errorBanner');
  const results = document.getElementById('results');

  function setLoading(on) {
    btn.disabled = on;
    btn.classList.toggle('loading', on);
    spinner.style.display = on ? 'block' : 'none';
    btn.querySelector('.btn-label').textContent = on ? 'Generating…' : 'Generate listing';
  }

  function showError(msg) {
    error.textContent = msg;
    error.classList.add('visible');
  }

  function clearError() {
    error.classList.remove('visible');
  }

  async function generate() {
    clearError();
    results.classList.remove('visible');

    const name     = document.getElementById('name').value.trim();
    const features = document.getElementById('features').value.trim();
    const audience = document.getElementById('audience').value.trim();

    if (!name) { showError('Please enter a product name.'); return; }

    setLoading(true);

    try {
      const res = await fetch('http://localhost:3000/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, features, audience })
      });

      if (!res.ok) throw new Error(`Server returned ${res.status}`);

      const data = await res.json();

      if (!data.title || !Array.isArray(data.bullets) || !data.description || !Array.isArray(data.ads)) {
        throw new Error('Response is missing expected fields.');
      }

      renderResults(data);

    } catch (err) {
      showError('Something went wrong: ' + err.message);
    } finally {
      setLoading(false);
    }
  }

  function renderResults(data) {
    // Title
    document.getElementById('titleText').textContent = data.title;

    // Bullets
    const ul = document.getElementById('bulletsList');
    ul.innerHTML = data.bullets.map(b => `<li>${esc(b)}</li>`).join('');
    document.getElementById('bulletsText').textContent = data.bullets.map(b => '• ' + b).join('\n');

    // Description
    document.getElementById('descText').textContent = data.description;

    // Ads
    const variants = ['A', 'B', 'C', 'D', 'E'];
    const adsList = document.getElementById('adsList');
    adsList.innerHTML = data.ads.map((a, i) => `
      <div class="ad-item">
        <div class="ad-item-body">
          <span class="ad-badge">VAR ${variants[i] || i + 1}</span>
          <span class="ad-text">${esc(a)}</span>
        </div>
        <div class="ad-item-actions">
          <button class="copy-btn" onclick="copyText(${JSON.stringify(a)}, this)">Copy</button>
        </div>
      </div>`).join('');
    document.getElementById('adsText').textContent = data.ads.map((a, i) => `[${variants[i] || i+1}] ${a}`).join('\n');

    results.classList.add('visible');
    results.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

//   function esc(str) {
//     return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
//   }
    function esc(str) {
    if (typeof str !== "string") return "";
    return str
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;');
    }

  function copySection(id, btn) {
    const el = document.getElementById(id);
    copyText(el.textContent.trim(), btn);
  }

  function copyText(text, btn) {
    navigator.clipboard.writeText(text.trim()).then(() => {
      btn.textContent = '✓ Copied';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 2000);
    });
  }
</script>
</body>
</html>
